version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"
      test:
        patterns:
          - "org.junit*"
          - "io.kotest*"
          - "org.assertj*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
